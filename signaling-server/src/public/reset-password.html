<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — GlyphConnect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; font-weight: 700;
    }
    .logo-text {
      color: #e5e5e5;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    h1 {
      color: #e5e5e5;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      color: rgba(255,255,255,0.35);
      font-size: 13px;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .field {
      position: relative;
      margin-bottom: 12px;
    }
    .field svg {
      position: absolute;
      left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 16px 12px 40px;
      font-size: 14px;
      color: white;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }
    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }
    .msg.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .msg.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
    }
    .msg svg { width: 14px; height: 14px; flex-shrink: 0; }
    .strength {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      transition: background 0.3s;
    }
    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-bottom: 14px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">G</div>
      <span class="logo-text">GlyphConnect</span>
    </div>

    <h1 id="title">Set New Password</h1>
    <p class="subtitle" id="subtitle">Enter your new password below.</p>

    <!-- Messages -->
    <div id="errorMsg" class="msg error hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="errorText"></span>
    </div>
    <div id="successMsg" class="msg success hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="successText"></span>
    </div>

    <!-- Form -->
    <form id="resetForm">
      <div class="field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="pw1" placeholder="New password" required minlength="8" autocomplete="new-password">
      </div>

      <div class="strength" id="strengthBars">
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
      </div>
      <p class="hint" id="strengthHint">Minimum 8 characters</p>

      <div class="field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="pw2" placeholder="Confirm password" required minlength="8" autocomplete="new-password">
      </div>

      <button type="submit" class="btn" id="submitBtn">Reset Password</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const pw1  = document.getElementById('pw1');
    const pw2  = document.getElementById('pw2');
    const bars = document.querySelectorAll('.strength-bar');
    const hint = document.getElementById('strengthHint');
    const submitBtn = document.getElementById('submitBtn');

    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      showError('Invalid or missing reset token. Please request a new password reset link.');
      form.style.display = 'none';
    }

    // Password strength meter
    pw1.addEventListener('input', () => {
      const v = pw1.value;
      let score = 0;
      if (v.length >= 8)  score++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
      if (/\d/.test(v))   score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;

      const colors = ['#ef4444', '#f59e0b', '#eab308', '#22c55e'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      bars.forEach((b, i) => {
        b.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.06)';
      });
      hint.textContent = v.length === 0 ? 'Minimum 8 characters' : labels[score - 1] || 'Too short';
      hint.style.color = v.length === 0 ? 'rgba(255,255,255,0.2)' : colors[score - 1] || '#ef4444';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      if (pw1.value !== pw2.value) {
        showError('Passwords do not match.');
        return;
      }
      if (pw1.value.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting…';

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw1.value }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Reset failed. The link may have expired.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
          return;
        }

        showSuccess('Password reset successfully! You can now sign in with your new password.');
        form.style.display = 'none';
        document.getElementById('title').textContent = 'Password Updated';
        document.getElementById('subtitle').textContent = 'You can close this page and sign in.';
      } catch (err) {
        showError('Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.remove('hidden');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      document.getElementById('successText').textContent = msg;
      el.classList.remove('hidden');
    }
    function hideMessages() {
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('successMsg').classList.add('hidden');
    }
  </script>
</body>
</html>
